plugins {
    id 'java'
    id 'application'
    id 'com.github.johnrengelman.shadow' version '8.1.1'
    id 'org.graalvm.buildtools.native' version '0.10.4'
}

group = 'com.ibm.mcp.zdtp'
version = '1.1.0'

application {
    mainClass = 'com.ibm.mcp.zdtp.ZdtpMcpApplication'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

repositories {
    mavenCentral()
}

dependencies {
    // Zero-Framework Policy: No Spring/heavy frameworks.
    // Specialized libraries for core features are allowed.
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.18.3'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310:2.18.3'

    // Markdown support
    implementation 'org.commonmark:commonmark:0.21.0'

    testImplementation platform('org.junit:junit-bom:5.11.4')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testImplementation 'org.mockito:mockito-core:5.14.2'
    testImplementation 'org.mockito:mockito-junit-jupiter:5.14.2'
    testImplementation 'org.assertj:assertj-core:3.26.3'
}

tasks.withType(Test) {
    useJUnitPlatform()
    jvmArgs '-Dnet.bytebuddy.experimental=true'
}

tasks.withType(JavaCompile) {
    options.compilerArgs << '-parameters'
}

processResources {
    // Inject project version into server.properties at build time
    filesMatching('server.properties') {
        expand(version: version)
    }
    // Bundle CHANGELOG.md inside the JAR so the server_changelog MCP tool can serve it
    from(rootDir) {
        include 'CHANGELOG.md'
    }
}

graalvmNative {
    binaries {
        main {
            imageName = 'zdtp-mcp'
            mainClass = 'com.ibm.mcp.zdtp.ZdtpMcpApplication'
            buildArgs.add('--no-fallback')
            buildArgs.add('--report-unsupported-elements-at-runtime')
        }
    }
}

tasks.named('jar') {
    manifest {
        attributes 'Main-Class': 'com.ibm.mcp.zdtp.ZdtpMcpApplication'
    }
}

tasks.named('shadowJar') {
    archiveClassifier.set('all')
    mergeServiceFiles()
}

// Fix for Shadow JAR and application plugin distribution task conflicts
// These tasks use the output of shadowJar (the jar with no classifier)
// without an explicit dependency, causing build failures in newer Gradle versions.
def shadowTasks = ['distZip', 'distTar', 'startScripts', 
                   'shadowDistZip', 'shadowDistTar', 'startShadowScripts']
shadowTasks.each { taskName ->
    tasks.findByName(taskName)?.dependsOn('shadowJar')
}
