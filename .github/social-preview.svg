<svg width="1280" height="640" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1280" height="640" fill="#0d1117"/>

  <!-- Top accent bar -->
  <rect width="1280" height="5" fill="#238636"/>

  <!-- Left: bullseye icon -->
  <circle cx="185" cy="310" r="110" fill="none" stroke="#30363d" stroke-width="2"/>
  <circle cx="185" cy="310" r="80"  fill="none" stroke="#238636" stroke-width="6"/>
  <circle cx="185" cy="310" r="50"  fill="none" stroke="#238636" stroke-width="6"/>
  <circle cx="185" cy="310" r="22"  fill="#238636"/>
  <!-- crosshair lines -->
  <line x1="185" y1="185" x2="185" y2="230" stroke="#238636" stroke-width="4" stroke-linecap="round"/>
  <line x1="185" y1="390" x2="185" y2="435" stroke="#238636" stroke-width="4" stroke-linecap="round"/>
  <line x1="60"  y1="310" x2="105" y2="310" stroke="#238636" stroke-width="4" stroke-linecap="round"/>
  <line x1="265" y1="310" x2="310" y2="310" stroke="#238636" stroke-width="4" stroke-linecap="round"/>

  <!-- Right: text block -->
  <!-- Main title -->
  <text x="355" y="250" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace" font-size="100" font-weight="700" fill="#ffffff" letter-spacing="-2">zdtp-mcp</text>

  <!-- Subtitle -->
  <text x="360" y="320" font-family="ui-sans-serif, system-ui, sans-serif" font-size="38" fill="#8b949e">Targetprocess MCP Server</text>

  <!-- Divider -->
  <line x1="355" y1="352" x2="1200" y2="352" stroke="#21262d" stroke-width="1.5"/>

  <!-- Stats pills -->
  <!-- 52 Tools -->
  <rect x="357" y="372" width="148" height="44" rx="22" fill="#161b22" stroke="#238636" stroke-width="1.5"/>
  <text x="431" y="400" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="600" fill="#238636" text-anchor="middle">52 Tools</text>

  <!-- 15 Domains -->
  <rect x="519" y="372" width="170" height="44" rx="22" fill="#161b22" stroke="#238636" stroke-width="1.5"/>
  <text x="604" y="400" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="600" fill="#238636" text-anchor="middle">15 Domains</text>

  <!-- Zero Framework -->
  <rect x="703" y="372" width="202" height="44" rx="22" fill="#161b22" stroke="#238636" stroke-width="1.5"/>
  <text x="804" y="400" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="600" fill="#238636" text-anchor="middle">Zero Framework</text>

  <!-- arm64 + amd64 -->
  <rect x="919" y="372" width="196" height="44" rx="22" fill="#161b22" stroke="#238636" stroke-width="1.5"/>
  <text x="1017" y="400" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="600" fill="#238636" text-anchor="middle">arm64 · amd64</text>

  <!-- Works with -->
  <text x="358" y="480" font-family="ui-sans-serif, system-ui, sans-serif" font-size="26" fill="#6e7681">Works with</text>
  <text x="498" y="480" font-family="ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="600" fill="#c9d1d9">Claude Code</text>
  <text x="672" y="480" font-family="ui-sans-serif, system-ui, sans-serif" font-size="26" fill="#6e7681">·</text>
  <text x="694" y="480" font-family="ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="600" fill="#c9d1d9">Gemini CLI</text>
  <text x="851" y="480" font-family="ui-sans-serif, system-ui, sans-serif" font-size="26" fill="#6e7681">·</text>
  <text x="873" y="480" font-family="ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="600" fill="#c9d1d9">Claude Desktop</text>
  <text x="1095" y="480" font-family="ui-sans-serif, system-ui, sans-serif" font-size="26" fill="#6e7681">· any MCP client</text>

  <!-- GitHub URL -->
  <text x="358" y="545" font-family="ui-monospace, monospace" font-size="22" fill="#3fb950">github.com/aldo-lushkja/zdtp-mcp</text>

  <!-- Bottom accent bar -->
  <rect y="635" width="1280" height="5" fill="#238636"/>
</svg>
