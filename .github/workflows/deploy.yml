name: Build and Publish Images

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Use Buildx for multi-stage building
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1. Build & Push JVM Image (Fast)
      - name: Build and push JVM Image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: jvm
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:1.0.0-jvm
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:jvm
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-jvm

      # 2. Build & Push Native Image (Slow, startup performance optimized)
      - name: Build and push Native Image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: native
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:1.0.0
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:native
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
